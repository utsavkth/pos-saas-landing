<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; -webkit-font-smoothing: antialiased; }
</style>
</helmet>
<nav style="position:sticky;top:0;z-index:50;background:#FBF6EDE8;backdrop-filter:blur(8px);borderBottom:1px solid #E8DDC9;fontFamily:'Nunito','Noto Sans Devanagari',sans-serif">
  <div style="max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;alignItems:center;justifyContent:space-between;gap:16px;flexWrap:wrap">
    <a href="Home.dc.html" style="display:flex;alignItems:center;gap:12px;textDecoration:none;flexShrink:0">
      <svg width="44" height="44" viewBox="0 0 48 48" style="borderRadius:12px;background:#2F4B3C;flexShrink:0">
        <rect x="10" y="22" width="28" height="16" rx="2" fill="#FBF6ED"></rect>
        <polygon points="24,9 39,22 9,22" fill="#B5502C"></polygon>
        <rect x="21" y="27" width="6" height="11" fill="#2F4B3C"></rect>
      </svg>
      <span style="fontFamily:'Baloo 2',sans-serif;fontSize:22px;fontWeight:700;color:#2B2019;letterSpacing:-0.3px;whiteSpace:nowrap">Khatiwada <span style="color:#B5502C">POS</span></span>
    </a>

    <sc-if value="{{ showFullNav }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;alignItems:center;gap:28px">
        <a href="Home.dc.html" style="fontSize:16px;fontWeight:700;textDecoration:none;color:{{ homeColor }};paddingBottom:2px;borderBottom:{{ homeBorder }}">{{ labels.home }}</a>
        <a href="Features.dc.html" style="fontSize:16px;fontWeight:700;textDecoration:none;color:{{ featuresColor }};paddingBottom:2px;borderBottom:{{ featuresBorder }}">{{ labels.features }}</a>
        <a href="Pricing.dc.html" style="fontSize:16px;fontWeight:700;textDecoration:none;color:{{ pricingColor }};paddingBottom:2px;borderBottom:{{ pricingBorder }}">{{ labels.pricing }}</a>
        <a href="About.dc.html" style="fontSize:16px;fontWeight:700;textDecoration:none;color:{{ aboutColor }};paddingBottom:2px;borderBottom:{{ aboutBorder }}">{{ labels.about }}</a>
        <a href="Contact.dc.html" style="fontSize:16px;fontWeight:700;textDecoration:none;color:{{ contactColor }};paddingBottom:2px;borderBottom:{{ contactBorder }}">{{ labels.contact }}</a>
      </div>
    </sc-if>

    <div style="display:flex;alignItems:center;gap:12px">
      <div style="display:flex;background:#F3E3D3;borderRadius:999px;padding:4px;position:relative">
        <button onClick="{{ setEn }}" style="border:none;cursor:pointer;padding:8px 16px;borderRadius:999px;fontFamily:'Nunito',sans-serif;fontSize:14px;fontWeight:800;background:{{ enBg }};color:{{ enColor }};transition:all .15s">EN</button>
        <button onClick="{{ setNe }}" style="border:none;cursor:pointer;padding:8px 16px;borderRadius:999px;fontFamily:'Noto Sans Devanagari','Nunito',sans-serif;fontSize:14px;fontWeight:700;background:{{ neBg }};color:{{ neColor }};transition:all .15s">नेपाली</button>
      </div>

      <sc-if value="{{ showFullNav }}" hint-placeholder-val="{{ true }}">
        <a href="Login.dc.html" style="textDecoration:none;background:#B5502C;color:#FFF;fontFamily:'Nunito',sans-serif;fontWeight:800;fontSize:15px;padding:12px 22px;borderRadius:999px;whiteSpace:nowrap">{{ labels.login }}</a>
      </sc-if>

      <sc-if value="{{ showHamburger }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ toggleMenu }}" aria-label="Menu" style="border:1px solid #E8DDC9;background:#FFF;borderRadius:12px;width:44px;height:44px;display:flex;flexDirection:column;alignItems:center;justifyContent:center;gap:4px;cursor:pointer">
          <span style="width:20px;height:2.5px;background:#2B2019;borderRadius:2px"></span>
          <span style="width:20px;height:2.5px;background:#2B2019;borderRadius:2px"></span>
          <span style="width:20px;height:2.5px;background:#2B2019;borderRadius:2px"></span>
        </button>
      </sc-if>
    </div>
  </div>

  <sc-if value="{{ mobileMenuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="borderTop:1px solid #E8DDC9;padding:12px 24px 20px;display:flex;flexDirection:column;gap:4px;background:#FBF6ED">
      <a href="Home.dc.html" style="padding:14px 8px;fontSize:17px;fontWeight:700;textDecoration:none;color:{{ homeColor }}">{{ labels.home }}</a>
      <a href="Features.dc.html" style="padding:14px 8px;fontSize:17px;fontWeight:700;textDecoration:none;color:{{ featuresColor }}">{{ labels.features }}</a>
      <a href="Pricing.dc.html" style="padding:14px 8px;fontSize:17px;fontWeight:700;textDecoration:none;color:{{ pricingColor }}">{{ labels.pricing }}</a>
      <a href="About.dc.html" style="padding:14px 8px;fontSize:17px;fontWeight:700;textDecoration:none;color:{{ aboutColor }}">{{ labels.about }}</a>
      <a href="Contact.dc.html" style="padding:14px 8px;fontSize:17px;fontWeight:700;textDecoration:none;color:{{ contactColor }}">{{ labels.contact }}</a>
      <a href="Login.dc.html" style="marginTop:8px;textAlign:center;textDecoration:none;background:#B5502C;color:#FFF;fontFamily:'Nunito',sans-serif;fontWeight:800;fontSize:16px;padding:14px 22px;borderRadius:999px">{{ labels.login }}</a>
    </div>
  </sc-if>
</nav>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;currentPage&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;,&quot;features&quot;,&quot;pricing&quot;,&quot;about&quot;,&quot;contact&quot;,&quot;login&quot;,&quot;privacy&quot;]}, &quot;lang&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;en&quot;,&quot;ne&quot;]}, &quot;onSetLang&quot;: {&quot;editor&quot;: null, &quot;tsType&quot;: &quot;(lang: string) =&gt; void&quot;}}">
const LABELS = {
  en: { home: 'Home', features: 'Features', pricing: 'Pricing', about: 'About', contact: 'Contact', login: 'Log In' },
  ne: { home: 'गृहपृष्ठ', features: 'सुविधाहरू', pricing: 'मूल्य', about: 'हाम्रो बारे', contact: 'सम्पर्क', login: 'लग इन' }
};

class Component extends DCLogic {
  state = { isMobile: false, mobileMenuOpen: false };

  componentDidMount() {
    this.check = () => this.setState({ isMobile: window.innerWidth < 1060, mobileMenuOpen: window.innerWidth >= 1060 ? false : this.state.mobileMenuOpen });
    this.check();
    window.addEventListener('resize', this.check);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this.check);
  }

  renderVals() {
    const lang = this.props.lang === 'ne' ? 'ne' : 'en';
    const current = this.props.currentPage || '';
    const setLang = (l) => { if (this.props.onSetLang) this.props.onSetLang(l); };
    const colorFor = (key) => current === key ? '#B5502C' : '#2B2019';
    const borderFor = (key) => current === key ? '2px solid #B5502C' : '2px solid transparent';

    return {
      labels: LABELS[lang],
      showFullNav: !this.state.isMobile,
      showHamburger: this.state.isMobile,
      mobileMenuOpen: this.state.isMobile && this.state.mobileMenuOpen,
      toggleMenu: () => this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen })),
      setEn: () => setLang('en'),
      setNe: () => setLang('ne'),
      enBg: lang === 'en' ? '#B5502C' : 'transparent',
      enColor: lang === 'en' ? '#FFF' : '#8B6F52',
      neBg: lang === 'ne' ? '#B5502C' : 'transparent',
      neColor: lang === 'ne' ? '#FFF' : '#8B6F52',
      homeColor: colorFor('home'), homeBorder: borderFor('home'),
      featuresColor: colorFor('features'), featuresBorder: borderFor('features'),
      pricingColor: colorFor('pricing'), pricingBorder: borderFor('pricing'),
      aboutColor: colorFor('about'), aboutBorder: borderFor('about'),
      contactColor: colorFor('contact'), contactBorder: borderFor('contact')
    };
  }
}
</script>
</body>
</html>
