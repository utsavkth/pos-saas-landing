<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style> body { margin: 0; background: #FBF6ED; -webkit-font-smoothing: antialiased; text-wrap: pretty; } </style>
</helmet>

<dc-import name="NavBar" current-page="contact" lang="{{ lang }}" on-set-lang="{{ setLang }}" hint-size="100%,72px"></dc-import>

<main style="fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;color:#2B2019">
  <section style="maxWidth:1080px;margin:0 auto;padding:64px 24px 88px;display:flex;gap:48px;flexWrap:wrap">
    <div style="flex:1 1 420px;minWidth:280px">
      <h1 style="fontFamily:'Baloo 2','Noto Sans Devanagari',sans-serif;fontSize:clamp(28px,3.8vw,40px);fontWeight:800;margin:0 0 14px">{{ title }}</h1>
      <p style="fontSize:17px;lineHeight:1.65;color:#6B5D4F;margin:0 0 32px">{{ sub }}</p>

      <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
        <div style="background:#E4EAE5;border:1px solid #2F4B3C;borderRadius:20px;padding:32px;display:flex;flexDirection:column;gap:10px;alignItems:flex-start">
          <svg width="44" height="44" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#2F4B3C"></circle><polyline points="14,25 21,32 34,17" fill="none" stroke="#FBF6ED" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>
          <h3 style="fontFamily:'Baloo 2','Noto Sans Devanagari',sans-serif;fontSize:20px;fontWeight:700;margin:6px 0 0">{{ successTitle }}</h3>
          <p style="fontSize:15px;color:#3E4C43;margin:0">{{ successSub }}</p>
        </div>
      </sc-if>

      <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
        <form onSubmit="{{ handleSubmit }}" style="display:flex;flexDirection:column;gap:20px">
          <label style="display:flex;flexDirection:column;gap:8px">
            <span style="fontSize:14px;fontWeight:700;color:#2B2019">{{ labels.name }}</span>
            <input value="{{ name }}" onChange="{{ onName }}" placeholder="{{ placeholders.name }}" style="fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;fontSize:16px;padding:14px 16px;borderRadius:12px;border:1px solid #E8DDC9;background:#FFFFFF;color:#2B2019"></input>
          </label>
          <label style="display:flex;flexDirection:column;gap:8px">
            <span style="fontSize:14px;fontWeight:700;color:#2B2019">{{ labels.email }}</span>
            <input type="email" value="{{ email }}" onChange="{{ onEmail }}" placeholder="{{ placeholders.email }}" style="fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;fontSize:16px;padding:14px 16px;borderRadius:12px;border:1px solid #E8DDC9;background:#FFFFFF;color:#2B2019"></input>
          </label>
          <label style="display:flex;flexDirection:column;gap:8px">
            <span style="fontSize:14px;fontWeight:700;color:#2B2019">{{ labels.message }}</span>
            <textarea value="{{ message }}" onChange="{{ onMessage }}" placeholder="{{ placeholders.message }}" rows="5" style="fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;fontSize:16px;padding:14px 16px;borderRadius:12px;border:1px solid #E8DDC9;background:#FFFFFF;color:#2B2019;resize:vertical"></textarea>
          </label>
          <button type="submit" style="border:none;cursor:pointer;background:#B5502C;color:#FFF;fontWeight:800;fontSize:17px;padding:16px 24px;borderRadius:999px;fontFamily:'Nunito','Noto Sans Devanagari',sans-serif">{{ labels.send }}</button>
        </form>
      </sc-if>
    </div>

    <div style="flex:1 1 300px;minWidth:260px;maxWidth:360px">
      <div style="background:#2F4B3C;borderRadius:24px;padding:32px;display:flex;flexDirection:column;gap:24px">
        <h3 style="fontFamily:'Baloo 2','Noto Sans Devanagari',sans-serif;fontSize:18px;fontWeight:700;margin:0;color:#FBF6ED">{{ panelTitle }}</h3>
        <div style="display:flex;flexDirection:column;gap:4px">
          <span style="fontSize:12px;fontWeight:800;textTransform:uppercase;letterSpacing:0.05em;color:#8FA298">{{ labels.emailLabel }}</span>
          <span style="fontSize:16px;fontWeight:700;color:#FBF6ED">hello@khatiwadapos.com</span>
        </div>
        <div style="display:flex;flexDirection:column;gap:4px">
          <span style="fontSize:12px;fontWeight:800;textTransform:uppercase;letterSpacing:0.05em;color:#8FA298">{{ labels.phoneLabel }}</span>
          <span style="fontSize:16px;fontWeight:700;color:#FBF6ED">{{ phoneValue }}</span>
        </div>
        <div style="display:flex;flexDirection:column;gap:4px">
          <span style="fontSize:12px;fontWeight:800;textTransform:uppercase;letterSpacing:0.05em;color:#8FA298">{{ labels.locationLabel }}</span>
          <span style="fontSize:16px;fontWeight:700;color:#FBF6ED">{{ locationValue }}</span>
        </div>
      </div>
    </div>
  </section>
</main>

<dc-import name="Footer" lang="{{ lang }}" hint-size="100%,320px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
const COPY = {
  en: {
    title: 'Get in touch', sub: 'Questions about Khatiwada POS? We\u2019d love to hear from you.',
    successTitle: 'Message sent', successSub: 'Thanks for reaching out, we\u2019ll get back to you soon.',
    panelTitle: 'Other ways to reach us', phoneValue: 'Coming soon', locationValue: 'Kathmandu, Nepal',
    labels: { name: 'Name', email: 'Email address', message: 'Message', send: 'Send message', emailLabel: 'Email', phoneLabel: 'Phone', locationLabel: 'Location' },
    placeholders: { name: 'Your name', email: 'you@example.com', message: 'Tell us about your shop or ask a question...' }
  },
  ne: {
    title: 'सम्पर्क गर्नुहोस्', sub: 'खटीवाडा POS बारे प्रश्न छ? हामी तपाईंको कुरा सुन्न चाहन्छौं।',
    successTitle: 'सन्देश पठाइयो', successSub: 'सम्पर्क गर्नुभएकोमा धन्यवाद, हामी चाँडै जवाफ दिनेछौं।',
    panelTitle: 'सम्पर्क गर्ने अन्य तरिकाहरू', phoneValue: 'चाँडै आउँदैछ', locationValue: 'काठमाडौं, नेपाल',
    labels: { name: 'नाम', email: 'इमेल ठेगाना', message: 'सन्देश', send: 'सन्देश पठाउनुहोस्', emailLabel: 'इमेल', phoneLabel: 'फोन', locationLabel: 'ठेगाना' },
    placeholders: { name: 'तपाईंको नाम', email: 'you@example.com', message: 'आफ्नो पसल वा प्रश्नको बारेमा लेख्नुहोस्...' }
  }
};

class Component extends DCLogic {
  state = { lang: 'en', name: '', email: '', message: '', submitted: false };
  renderVals() {
    const c = COPY[this.state.lang];
    return {
      lang: this.state.lang,
      setLang: (l) => this.setState({ lang: l }),
      title: c.title, sub: c.sub, successTitle: c.successTitle, successSub: c.successSub,
      panelTitle: c.panelTitle, phoneValue: c.phoneValue, locationValue: c.locationValue,
      labels: c.labels, placeholders: c.placeholders,
      name: this.state.name, email: this.state.email, message: this.state.message,
      onName: (e) => this.setState({ name: e.target.value }),
      onEmail: (e) => this.setState({ email: e.target.value }),
      onMessage: (e) => this.setState({ message: e.target.value }),
      submitted: this.state.submitted, notSubmitted: !this.state.submitted,
      handleSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); }
    };
  }
}
</script>
</body>
</html>
