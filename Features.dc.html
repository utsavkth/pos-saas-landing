<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style> body { margin: 0; background: #FBF6ED; -webkit-font-smoothing: antialiased; text-wrap: pretty; } </style>
</helmet>

<dc-import name="NavBar" current-page="features" lang="{{ lang }}" on-set-lang="{{ setLang }}" hint-size="100%,72px"></dc-import>

<main style="fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;color:#2B2019">
  <section style="maxWidth:900px;margin:0 auto;padding:64px 24px 8px;textAlign:center">
    <h1 style="fontFamily:'Baloo 2','Noto Sans Devanagari',sans-serif;fontSize:clamp(30px,4vw,44px);fontWeight:800;margin:0 0 16px">{{ pageTitle }}</h1>
    <p style="fontSize:18px;color:#6B5D4F;margin:0">{{ pageSub }}</p>
  </section>

  <section style="maxWidth:1000px;margin:0 auto;padding:56px 24px 24px">
    <sc-for list="{{ features }}" as="f" hint-placeholder-count="6">
      <div style="display:flex;flexDirection:{{ f.dir }};alignItems:center;gap:40px;padding:36px 0;borderBottom:1px solid #E8DDC9;flexWrap:wrap">
        <div style="flex:0 0 auto;width:120px;height:120px;borderRadius:28px;background:{{ f.tint }};display:flex;alignItems:center;justifyContent:center;margin:0 auto">
          <sc-if value="{{ f.isCamera }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48"><rect x="6" y="14" width="36" height="24" rx="6" fill="#B5502C"></rect><rect x="17" y="8" width="14" height="8" rx="2" fill="#B5502C"></rect><circle cx="24" cy="26" r="8" fill="#F3E3D3"></circle><circle cx="24" cy="26" r="4" fill="#B5502C"></circle></svg>
          </sc-if>
          <sc-if value="{{ f.isScale }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48" fill="none" stroke="#2F4B3C" stroke-width="2.8" stroke-linecap="round"><line x1="24" y1="6" x2="24" y2="34"></line><line x1="9" y1="13" x2="39" y2="13"></line><circle cx="9" cy="24" r="7" fill="#F3E3D3"></circle><circle cx="39" cy="24" r="7" fill="#F3E3D3"></circle><line x1="16" y1="42" x2="32" y2="42"></line></svg>
          </sc-if>
          <sc-if value="{{ f.isGlobe }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48" fill="none" stroke="#B5502C" stroke-width="2.6"><circle cx="24" cy="24" r="17"></circle><ellipse cx="24" cy="24" rx="7" ry="17"></ellipse><line x1="7" y1="24" x2="41" y2="24"></line></svg>
          </sc-if>
          <sc-if value="{{ f.isAdmin }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48"><rect x="6" y="6" width="17" height="14" rx="3" fill="#2F4B3C"></rect><rect x="25" y="6" width="17" height="9" rx="3" fill="#2F4B3C" opacity="0.55"></rect><rect x="25" y="17" width="17" height="9" rx="3" fill="#2F4B3C" opacity="0.55"></rect><rect x="6" y="22" width="17" height="20" rx="3" fill="#2F4B3C" opacity="0.8"></rect><rect x="25" y="28" width="17" height="14" rx="3" fill="#2F4B3C"></rect></svg>
          </sc-if>
          <sc-if value="{{ f.isQr }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48"><rect x="6" y="6" width="14" height="14" fill="#B5502C"></rect><rect x="10" y="10" width="6" height="6" fill="#F3E3D3"></rect><rect x="28" y="6" width="14" height="14" fill="#B5502C"></rect><rect x="32" y="10" width="6" height="6" fill="#F3E3D3"></rect><rect x="6" y="28" width="14" height="14" fill="#B5502C"></rect><rect x="10" y="32" width="6" height="6" fill="#F3E3D3"></rect><rect x="28" y="28" width="6" height="6" fill="#B5502C"></rect><rect x="36" y="28" width="6" height="6" fill="#B5502C"></rect><rect x="28" y="36" width="6" height="6" fill="#B5502C"></rect></svg>
          </sc-if>
          <sc-if value="{{ f.isEase }}" hint-placeholder-val="{{ false }}">
            <svg width="56" height="56" viewBox="0 0 48 48" fill="none" stroke="#2F4B3C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="24" cy="24" r="18"></circle><polyline points="15,25 21,31 33,17"></polyline></svg>
          </sc-if>
        </div>
        <div style="flex:1 1 360px;minWidth:260px">
          <div style="fontSize:13px;fontWeight:800;letterSpacing:0.06em;textTransform:uppercase;color:#B5502C;marginBottom:8px">{{ f.kicker }}</div>
          <h2 style="fontFamily:'Baloo 2','Noto Sans Devanagari',sans-serif;fontSize:24px;fontWeight:700;margin:0 0 10px">{{ f.title }}</h2>
          <p style="fontSize:16px;lineHeight:1.7;color:#6B5D4F;margin:0">{{ f.desc }}</p>
          <sc-if value="{{ f.note }}" hint-placeholder-val="{{ false }}">
            <div style="display:inline-flex;alignItems:center;gap:8px;marginTop:14px;background:#F3E3D3;borderRadius:999px;padding:8px 16px">
              <span style="fontSize:12px;fontWeight:800;color:#954025;textTransform:uppercase;letterSpacing:0.04em">{{ comingSoonLabel }}</span>
              <span style="fontSize:13px;color:#6B5D4F">{{ f.note }}</span>
            </div>
          </sc-if>
        </div>
      </div>
    </sc-for>
  </section>

  <section style="maxWidth:1000px;margin:0 auto;padding:24px 24px 80px">
    <div style="background:#2F4B3C;borderRadius:24px;padding:40px;display:flex;alignItems:center;gap:28px;flexWrap:wrap">
      <svg width="52" height="52" viewBox="0 0 48 48" style="flexShrink:0">
        <rect x="4" y="20" width="20" height="24" rx="3" fill="#FBF6ED" opacity="0.4"></rect>
        <rect x="14" y="10" width="24" height="17" rx="3" fill="#FBF6ED" opacity="0.65"></rect>
        <rect x="20" y="4" width="12" height="20" rx="2.5" fill="#FBF6ED"></rect>
      </svg>
      <p style="fontSize:18px;lineHeight:1.6;color:#FBF6ED;margin:0;fontWeight:600;flex:1 1 300px">{{ deviceNote }}</p>
    </div>
  </section>

  <section style="padding:8px 24px 88px;textAlign:center">
    <a href="/login" style="textDecoration:none;background:#B5502C;color:#FFF;fontWeight:800;fontSize:18px;padding:18px 40px;borderRadius:999px;display:inline-block;boxShadow:0 8px 24px rgba(181,80,44,0.28)">{{ cta }}</a>
  </section>
</main>

<dc-import name="Footer" lang="{{ lang }}" hint-size="100%,320px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
const COPY = {
  en: {
    pageTitle: 'Everything your shop needs, nothing it doesn\u2019t', pageSub: 'A closer look at what Khatiwada POS actually does.',
    cta: 'Get Started', comingSoonLabel: 'Coming soon',
    deviceNote: 'Works on the device you already have, phone, tablet, or laptop. Any device with a camera and a browser is enough. Prefer a dedicated barcode scanner? You can pair one in, but it\u2019s never required.',
    features: [
      { key: 'camera', kicker: 'Scanning', title: 'Scan barcodes with your camera', desc: 'No barcode scanner to buy, no cables, no setup. Point your phone or tablet camera at any barcode and it\u2019s added to the sale instantly.' },
      { key: 'scale', kicker: 'Loose goods', title: 'Built for items sold by weight, too', desc: 'Rice, lentils, spices, and other loose goods work just as easily as packaged items, enter the weight and the price calculates itself. From weighted items to individual items, we\u2019ve got you covered.' },
      { key: 'globe', kicker: 'Bilingual', title: 'A cashier screen anyone can use', desc: 'Switch the whole cashier screen between English and Nepali with one tap, so every staff member feels comfortable, not just the tech-savvy ones.' },
      { key: 'admin', kicker: 'Admin panel', title: 'An admin panel that keeps you in control', desc: 'Monthly sales reports, best-selling item stats, CSV import and export, product photos, and support for multiple staff logins, and much more, everything an owner needs, in one place.' },
      { key: 'qr', kicker: 'Payments', title: 'Cash and QR payments, side by side', desc: 'Keep accepting cash exactly as you do today, and offer QR-based digital payment as an option, no separate payment device needed.', note: 'Custom-branded QR codes, like the big marts use, are in the works. This will require registering with Fonepay Business, and we\u2019re working with them to get there.' },
      { key: 'ease', kicker: 'Made simple', title: 'Designed for first-time software users', desc: 'Large buttons, clear steps, and no confusing menus. If you\u2019ve never used a POS system before, this is where we started designing from.' }
    ]
  },
  ne: {
    pageTitle: 'पसललाई चाहिने सबै कुरा, नचाहिने कुनै कुरा छैन', pageSub: 'खटीवाडा POS ले वास्तवमा के गर्छ भन्ने नजिकबाट हेरौं।',
    cta: 'सुरु गर्नुहोस्', comingSoonLabel: 'चाँडै आउँदैछ',
    deviceNote: 'तपाईंसँग भइरहेको डिभाइसमै चल्छ, फोन, ट्याब्लेट, वा ल्यापटप। क्यामेरा र ब्राउजर भएको जुनसुकै डिभाइस पर्याप्त छ। छुट्टै बारकोड स्क्यानर मन पराउनुहुन्छ भने, जोड्न सकिन्छ, तर कहिल्यै अनिवार्य छैन।',
    features: [
      { key: 'camera', kicker: 'स्क्यानिङ', title: 'क्यामेराले बारकोड स्क्यान गर्नुहोस्', desc: 'छुट्टै बारकोड स्क्यानर किन्नु पर्दैन, तार वा सेटअप चाहिँदैन। फोन वा ट्याब्लेटको क्यामेरा बारकोडतिर देखाउनुहोस्, सामान तुरुन्तै बिक्रीमा थपिन्छ।' },
      { key: 'scale', kicker: 'खुला सामान', title: 'तौलले बेचिने सामानका लागि पनि उपयुक्त', desc: 'चामल, दाल, मसला जस्ता खुला सामान प्याकेट गरिएका सामान जत्तिकै सजिलै चल्छ, तौल राख्नुहोस्, मूल्य आफैं गणना हुन्छ। तौलले बेचिने सामानदेखि एकल इकाइका सामानसम्म, सबैका लागि हामी तयार छौं।' },
      { key: 'globe', kicker: 'द्विभाषिक', title: 'जो कसैले पनि चलाउन सक्ने क्यासियर स्क्रिन', desc: 'एक ट्यापमा पूरै क्यासियर स्क्रिन अंग्रेजी र नेपालीबीच बदल्नुहोस्, जसले गर्दा हरेक स्टाफ सहज महसुस गर्छन्।' },
      { key: 'admin', kicker: 'एडमिन प्यानल', title: 'पूर्ण नियन्त्रण दिने एडमिन प्यानल', desc: 'मासिक बिक्री रिपोर्ट, सबैभन्दा धेरै बिक्री हुने सामानको तथ्याङ्क, CSV आयात र निर्यात, प्रोडक्टका फोटो, र धेरै स्टाफका लागि छुट्टाछुट्टै लगइन, अनि थप धेरै, पसल मालिकलाई चाहिने सबै कुरा एकैठाउँमा।' },
      { key: 'qr', kicker: 'भुक्तानी', title: 'नगद र QR भुक्तानी, दुवै एकैसाथ', desc: 'अहिले जस्तै नगद स्वीकार्नुहोस्, र थप विकल्पका रूपमा QR डिजिटल भुक्तानी पनि दिनुहोस्, छुट्टै भुक्तानी उपकरण चाहिँदैन।', note: 'ठूला मार्टहरूले चलाउने जस्तै आफ्नै ब्रान्डेड QR कोड ल्याउने काम भइरहेको छ। यसका लागि Fonepay Business मा दर्ता गर्नुपर्नेछ, र हामी सँगै त्यो लक्ष्यतिर काम गर्दैछौं।' },
      { key: 'ease', kicker: 'सरल बनाइएको', title: 'पहिलोपटक सफ्टवेयर प्रयोग गर्नेका लागि डिजाइन गरिएको', desc: 'ठूला बटन, स्पष्ट चरणहरू, र अल्मल्याउने मेनुहरू छैनन्। तपाईंले पहिले कहिल्यै POS प्रयोग गर्नुभएको छैन भने, हामीले उतैबाट डिजाइन सुरु गर्‍यौं।' }
    ]
  }
};

class Component extends DCLogic {
  state = { lang: 'en' };
  renderVals() {
    const c = COPY[this.state.lang];
    const tints = ['#F3E3D3', '#E4EAE5', '#F3E3D3', '#E4EAE5', '#F3E3D3', '#E4EAE5'];
    return {
      lang: this.state.lang,
      setLang: (l) => this.setState({ lang: l }),
      pageTitle: c.pageTitle, pageSub: c.pageSub, cta: c.cta, deviceNote: c.deviceNote, comingSoonLabel: c.comingSoonLabel,
      features: c.features.map((f, i) => ({ ...f, tint: tints[i], dir: i % 2 === 0 ? 'row' : 'row-reverse',
        isCamera: f.key === 'camera', isScale: f.key === 'scale', isGlobe: f.key === 'globe', isAdmin: f.key === 'admin', isQr: f.key === 'qr', isEase: f.key === 'ease' }))
    };
  }
}
</script>
</body>
</html>
