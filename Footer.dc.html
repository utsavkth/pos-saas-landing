<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
</helmet>
<footer style="background:#2F4B3C;fontFamily:'Nunito','Noto Sans Devanagari',sans-serif;color:#E4EAE5;padding:56px 24px 28px">
  <div style="max-width:1280px;margin:0 auto;display:flex;flexWrap:wrap;gap:40px;justifyContent:space-between">
    <div style="flex:2 1 260px;maxWidth:340px">
      <div style="display:flex;alignItems:center;gap:10px;marginBottom:14px">
        <svg width="36" height="36" viewBox="0 0 48 48" style="borderRadius:10px;background:#3E5C4B;flexShrink:0">
          <rect x="10" y="22" width="28" height="16" rx="2" fill="#FBF6ED"></rect>
          <polygon points="24,9 39,22 9,22" fill="#B5502C"></polygon>
          <rect x="21" y="27" width="6" height="11" fill="#3E5C4B"></rect>
        </svg>
        <span style="fontFamily:'Baloo 2',sans-serif;fontSize:20px;fontWeight:700;color:#FBF6ED">Khatiwada <span style="color:#D9895F">POS</span></span>
      </div>
      <p style="fontSize:15px;lineHeight:1.7;color:#C9D3CB;margin:0">{{ tagline }}</p>
    </div>

    <div style="flex:1 1 140px">
      <div style="fontSize:13px;fontWeight:800;letterSpacing:0.06em;textTransform:uppercase;color:#8FA298;marginBottom:16px">{{ labels.company }}</div>
      <div style="display:flex;flexDirection:column;gap:12px">
        <a href="Home.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.home }}</a>
        <a href="About.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.about }}</a>
        <a href="Contact.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.contact }}</a>
      </div>
    </div>

    <div style="flex:1 1 140px">
      <div style="fontSize:13px;fontWeight:800;letterSpacing:0.06em;textTransform:uppercase;color:#8FA298;marginBottom:16px">{{ labels.product }}</div>
      <div style="display:flex;flexDirection:column;gap:12px">
        <a href="Features.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.features }}</a>
        <a href="Pricing.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.pricing }}</a>
        <a href="Login.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.login }}</a>
      </div>
    </div>

    <div style="flex:1 1 160px">
      <div style="fontSize:13px;fontWeight:800;letterSpacing:0.06em;textTransform:uppercase;color:#8FA298;marginBottom:16px">{{ labels.legal }}</div>
      <div style="display:flex;flexDirection:column;gap:12px">
        <a href="Privacy.dc.html" style="color:#E4EAE5;textDecoration:none;fontSize:15px;fontWeight:600">{{ labels.privacy }}</a>
        <span style="color:#8FA298;fontSize:14px">hello@khatiwadapos.com</span>
      </div>
    </div>
  </div>

  <div style="maxWidth:1280px;margin:44px auto 0;paddingTop:24px;borderTop:1px solid #3E5C4B;display:flex;justifyContent:space-between;flexWrap:wrap;gap:12px">
    <span style="fontSize:13px;color:#8FA298">{{ copyright }}</span>
    <span style="fontSize:13px;color:#8FA298">{{ builtIn }}</span>
  </div>
</footer>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;lang&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;en&quot;,&quot;ne&quot;]}}">
const LABELS = {
  en: { company: 'Company', home: 'Home', about: 'About Us', contact: 'Contact', product: 'Product', features: 'Features', pricing: 'Pricing', login: 'Log In', legal: 'Legal', privacy: 'Privacy Policy' },
  ne: { company: 'कम्पनी', home: 'गृहपृष्ठ', about: 'हाम्रो बारे', contact: 'सम्पर्क', product: 'प्रोडक्ट', features: 'सुविधाहरू', pricing: 'मूल्य', login: 'लग इन', legal: 'कानुनी', privacy: 'गोपनीयता नीति' }
};
const TAGLINE = { en: 'A simple, honest point-of-sale system built for shops of every size across Nepal.', ne: 'नेपालभरका हरेक आकारका पसलहरूका लागि बनाइएको सरल र भरपर्दो पस (POS) प्रणाली।' };
const COPYRIGHT = { en: '© 2026 Khatiwada POS. All rights reserved.', ne: '© २०२६ खटीवाडा पस। सर्वाधिकार सुरक्षित।' };
const BUILT = { en: 'Built in Kathmandu, for shopkeepers everywhere.', ne: 'काठमाडौंमा निर्मित, सबै पसलेहरूका लागि।' };

class Component extends DCLogic {
  renderVals() {
    const lang = this.props.lang === 'ne' ? 'ne' : 'en';
    return { labels: LABELS[lang], tagline: TAGLINE[lang], copyright: COPYRIGHT[lang], builtIn: BUILT[lang] };
  }
}
</script>
</body>
</html>
